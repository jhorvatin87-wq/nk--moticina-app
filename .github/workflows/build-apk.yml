name: Izradi Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Preuzmi repozitorij
        uses: actions/checkout@v4

      - name: Raspakiraj Android projekt
        run: |
          mkdir android-project
          unzip NK-Moticina-Manager-3.3-Android-Projekt.zip -d android-project

      - name: Postavi Javu
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Postavi Android SDK
        uses: android-actions/setup-android@v3

      - name: Instaliraj Android alate
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Postavi Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Izradi APK
        run: gradle -p android-project assembleDebug

      - name: Spremi APK
        uses: actions/upload-artifact@v4
        with:
          name: NK-Moticina-Manager-APK
          path: android-project/app/build/outputs/apk/debug/app-debug.apk
